name: publish

# Publishes to PyPI via Trusted Publishing (OIDC) — no API token stored.
# Fires when you publish a GitHub Release; build first, then publish from the
# `pypi` environment that holds the trusted-publisher grant.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

env:
  # run the bundled JS actions on Node 24 (Node 20 is being deprecated)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write      # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
