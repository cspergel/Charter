name: ci
on: [push, pull_request]
permissions:
  contents: read
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ matrix.python }}" }
      - run: python -m py_compile charter.py
      - run: pip install "pytest==8.*"
      - run: pytest tests/ -q
      - run: pip install .
      - run: charter --help
