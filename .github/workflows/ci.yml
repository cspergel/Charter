name: ci
on: [push, pull_request]
permissions:
  contents: read
env:
  # run the bundled JS actions on Node 24 (Node 20 is being deprecated)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ matrix.python }}" }
      - run: python -m py_compile charter.py
      - run: pip install "pytest==8.*"
      - run: pytest tests/ -q
      - run: pip install .
      - run: charter --help
      # Charter governs Charter: its own CHARTER.md must stay enforceable.
      - name: charter governs charter
        env:
          CHARTER_TRUST_ASSERTS: "1"
        run: charter check
